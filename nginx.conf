server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Hide nginx version
    server_tokens off;

    # Only allow GET and HEAD
    if ($request_method !~ ^(GET|HEAD)$) {
        return 405;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff2?|mp3)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options                     "DENY"                                                always;
    add_header X-Content-Type-Options              "nosniff"                                             always;
    add_header Referrer-Policy                     "strict-origin-when-cross-origin"                     always;
    add_header Permissions-Policy                  "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Cross-Origin-Opener-Policy          "same-origin"                                         always;
    add_header Cross-Origin-Resource-Policy        "same-origin"                                         always;
    add_header Strict-Transport-Security           "max-age=31536000; includeSubDomains"                 always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self'; media-src 'self'; connect-src 'none'; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'none';"
        always;

    gzip on;
    gzip_types text/css application/javascript image/svg+xml text/html;
}
